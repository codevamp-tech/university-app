<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Academic Curator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#fffbff",
                        "inverse-surface": "#2d3133",
                        "surface-variant": "#e0e3e6",
                        "on-primary-fixed": "#001945",
                        "inverse-primary": "#b0c6ff",
                        "primary-fixed": "#d9e2ff",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f7f9fc",
                        "surface-container-highest": "#e0e3e6",
                        "on-primary-fixed-variant": "#00419c",
                        "outline": "#737785",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#b5c8fe",
                        "on-tertiary-fixed-variant": "#763400",
                        "surface": "#f7f9fc",
                        "on-secondary-fixed-variant": "#324673",
                        "inverse-on-surface": "#eff1f4",
                        "surface-container-high": "#e6e8eb",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbc9",
                        "on-background": "#191c1e",
                        "surface-container-low": "#f2f4f7",
                        "primary": "#0055c7",
                        "on-secondary": "#ffffff",
                        "surface-container": "#eceef1",
                        "secondary": "#4a5d8c",
                        "on-primary-container": "#fefcff",
                        "primary-container": "#2d6fe7",
                        "tertiary-fixed-dim": "#ffb68c",
                        "on-secondary-container": "#405381",
                        "surface-tint": "#0058cc",
                        "tertiary": "#964400",
                        "secondary-fixed": "#d9e2ff",
                        "outline-variant": "#c2c6d6",
                        "surface-bright": "#f7f9fc",
                        "surface-dim": "#d8dadd",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424654",
                        "on-tertiary-fixed": "#321200",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-secondary-fixed": "#001945",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b2c6fb",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#bd5700",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ghost-border {
            box-shadow: 0 0 0 2px rgba(0, 85, 199, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- Suppressing Navigation Shell as per Rule: Login is a Transactional/Linear screen -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-[440px] flex flex-col">
<!-- Logo Section: The Academic Curator Identity -->
<div class="flex flex-col items-center mb-12">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 mb-6">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="school">school</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">
                    Academic Curator
                </h1>
<p class="text-on-surface-variant mt-2 font-medium">Welcome to your curated workspace</p>
</div>
<!-- Login Card: Level 2 Layering (surface-container-lowest) -->
<div class="bg-surface-container-lowest rounded-3xl p-8 md:p-10 shadow-[0_32px_64px_-12px_rgba(25,28,30,0.04)]">
<form class="space-y-6">
<!-- User ID Field -->
<div class="space-y-2">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block ml-1">
                            User ID / Email
                        </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline font-medium focus:ring-0 focus:bg-surface-container-lowest transition-all ghost-border focus:shadow-[0_0_0_2px_rgba(0,85,199,0.15)]" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">
                                Password
                            </label>
<a class="text-[11px] font-bold text-primary hover:underline transition-all" href="#">
                                Forgot Password?
                            </a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline font-medium focus:ring-0 focus:bg-surface-container-lowest transition-all ghost-border focus:shadow-[0_0_0_2px_rgba(0,85,199,0.15)]" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-xl shadow-[0_8px_20px_-4px_rgba(0,85,199,0.3)] hover:shadow-[0_12px_24px_-4px_rgba(0,85,199,0.4)] active:scale-[0.98] transition-all duration-200" type="submit">
                        Sign In
                    </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-surface-container-high"></div>
<span class="font-label text-[10px] font-bold text-outline tracking-widest">OR</span>
<div class="h-[1px] flex-grow bg-surface-container-high"></div>
</div>
<!-- Secondary Action -->
<button class="w-full bg-surface-container-high text-primary font-headline font-bold py-4 rounded-xl hover:bg-surface-container-highest active:scale-[0.98] transition-all duration-200" type="button">
                        Continue as Guest
                    </button>
</form>
</div>
<!-- Footer Quote / Aesthetic Decoration -->
<div class="mt-12 text-center px-8">
<div class="relative inline-block">
<p class="italic text-on-surface-variant font-body text-sm leading-relaxed">
                        "Education is the most powerful weapon which you can use to change the world."
                    </p>
<div class="absolute -top-4 -left-6 opacity-10">
<span class="material-symbols-outlined text-4xl" data-icon="format_quote">format_quote</span>
</div>
</div>
</div>
</div>
</main>
<!-- Aesthetic Layering Detail -->
<div class="fixed bottom-0 left-0 w-full h-1/3 pointer-events-none z-[-1] opacity-40">
<div class="absolute bottom-0 left-[-10%] w-[40%] h-[80%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[40%] h-[80%] rounded-full bg-tertiary/5 blur-[120px]"></div>
</div>
</body></html>
