<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                        "inverse-on-surface": "#eff1f4",

                    borderRadius: {

                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white font-body text-on-background antialiased overflow-hidden">
<!-- Suppression of Nav Shell as per Linear/Transactional Rule -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-6">
<!-- Skip Action -->
<div class="fixed top-8 right-8 z-50">
<button class="text-on-surface-variant hover:text-primary font-semibold text-sm tracking-wide transition-colors">
                Skip
            </button>
</div>
<div class="w-full max-w-md flex flex-col items-center">
<!-- Illustration Area (The Asymmetric Composition) -->
<div class="relative w-full aspect-square mb-12 flex items-center justify-center">
<!-- Decorative Backdrop Shapes -->
<div class="absolute inset-0 bg-primary/5 rounded-3xl -rotate-6 scale-95"></div>
<div class="absolute inset-0 bg-secondary-container/10 rounded-3xl rotate-3 scale-90"></div>
<!-- Main Illustration "Focus Float" -->
<div class="relative z-10 w-4/5 aspect-square bg-surface-container-lowest rounded-3xl shadow-[0_32px_64px_-12px_rgba(0,85,199,0.08)] p-8 flex flex-col justify-between border border-outline-variant/10">
<div class="flex justify-between items-start">
<div class="p-3 bg-primary/10 rounded-2xl text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="text-right">
<p class="text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Status</p>
<span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold">PAID</span>
</div>
</div>
<div class="space-y-4">
<div class="h-2 w-2/3 bg-surface-container rounded-full"></div>
<div class="h-2 w-full bg-surface-container-low rounded-full"></div>
<!-- Floating Results Card -->
<div class="mt-4 p-4 bg-primary-container text-on-primary-container rounded-2xl shadow-lg transform translate-x-6">
<div class="flex items-center gap-3">
<div class="bg-white/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-white text-xl">analytics</span>
</div>
<div>
<p class="text-[10px] font-bold opacity-80">FINAL GPA</p>
<p class="text-lg font-extrabold leading-none">3.92</p>
</div>
</div>
</div>
</div>
<img alt="abstract financial management" class="absolute -bottom-4 -left-4 w-24 h-24 rounded-2xl object-cover shadow-xl border-4 border-white" data-alt="Close-up of a digital tablet showing clean financial charts and university fee structures with blue and white color palette" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUdgb3lp5Fjb6-wMzfwhghSyXHawdwkXqb5iYLKaDIyKGKSvO1Ta4n5UjtKcDxUUR354b0GwYpDhcfeyMJcHpQ4aUGJHNDpo2M38Yp3rvGQZnNeKWgntVqPAqU1Br2Rp9M5k3Q6d0AqnO27HnetP3Zu-boirgolye2WK1IKJeKTQkR21DivXn_QmdnLpc1SQEgX2CoeMYe84MsgAkRPL2uJe_lhT0wojz5Pi0p2Vbv_bgfkw17mXqN2LpXzywpMUa01BGGat_RafwF"/>
</div>
</div>
<!-- Content Section -->
<div class="text-center space-y-6">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">
                    Manage Fees &amp; Results
                </h1>
<p class="text-on-surface-variant leading-relaxed px-4">
                    Keep track of your academic standing and financial commitments in one streamlined, editorial interface.
                </p>
</div>
<!-- Interaction Section -->
<div class="mt-12 w-full flex flex-col items-center gap-8">
<!-- Stepper -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Next Button (Signature Gradient) -->
<button class="group relative w-full h-16 rounded-3xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg shadow-[0_8px_24px_-4px_rgba(0,85,199,0.3)] hover:shadow-[0_12px_32px_-4px_rgba(0,85,199,0.4)] transition-all active:scale-95 flex items-center justify-center gap-3">
                    Next
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Visual Texture Layers -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-30">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary-container/10 blur-[120px] rounded-full"></div>
</div>
</body></html>
