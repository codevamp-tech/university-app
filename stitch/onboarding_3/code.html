<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Stay Updated</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#fffbff",
                        "inverse-surface": "#2d3133",
                        "surface-variant": "#e0e3e6",
                        "on-primary-fixed": "#001945",
                        "inverse-primary": "#b0c6ff",
                        "primary-fixed": "#d9e2ff",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f7f9fc",
                        "surface-container-highest": "#e0e3e6",
                        "on-primary-fixed-variant": "#00419c",
                        "outline": "#737785",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#b5c8fe",
                        "on-tertiary-fixed-variant": "#763400",
                        "surface": "#f7f9fc",
                        "on-secondary-fixed-variant": "#324673",
                        "inverse-on-surface": "#eff1f4",
                        "surface-container-high": "#e6e8eb",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbc9",
                        "on-background": "#191c1e",
                        "surface-container-low": "#f2f4f7",
                        "primary": "#0055c7",
                        "on-secondary": "#ffffff",
                        "surface-container": "#eceef1",
                        "secondary": "#4a5d8c",
                        "on-primary-container": "#fefcff",
                        "primary-container": "#2d6fe7",
                        "tertiary-fixed-dim": "#ffb68c",
                        "on-secondary-container": "#405381",
                        "surface-tint": "#0058cc",
                        "tertiary": "#964400",
                        "secondary-fixed": "#d9e2ff",
                        "outline-variant": "#c2c6d6",
                        "surface-bright": "#f7f9fc",
                        "surface-dim": "#d8dadd",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424654",
                        "on-tertiary-fixed": "#321200",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-secondary-fixed": "#001945",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b2c6fb",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#bd5700",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest font-body text-on-background min-h-screen flex flex-col">
<!-- Top Navigation (Onboarding Focus) -->
<header class="fixed top-0 w-full z-50 flex justify-end items-center px-8 py-6">
<button class="text-on-surface-variant font-label text-sm font-semibold tracking-wider hover:text-primary transition-colors">
            SKIP
        </button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 max-w-lg mx-auto w-full">
<!-- Illustration Section: Asymmetric Composition with Layering -->
<div class="relative w-full aspect-square mb-12 flex items-center justify-center">
<!-- Background Decorative Shape (Tonal Shift) -->
<div class="absolute inset-0 bg-surface-container-low rounded-3xl -rotate-3 scale-95 opacity-50"></div>
<!-- Main Illustration Container -->
<div class="relative z-10 w-full h-full bg-surface-container-lowest rounded-3xl shadow-[0_32px_64px_-12px_rgba(0,85,199,0.08)] overflow-hidden flex items-center justify-center border border-outline-variant/10">
<!-- Mock Notification Center Graphic -->
<div class="space-y-4 w-3/4">
<!-- Layered Card 1: Success State -->
<div class="bg-white p-4 rounded-xl shadow-sm border border-outline-variant/20 flex items-center gap-4 transform -translate-x-4">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">notifications</span>
</div>
<div class="flex-1">
<div class="h-2 w-24 bg-surface-container-highest rounded-full mb-2"></div>
<div class="h-2 w-32 bg-surface-container-low rounded-full"></div>
</div>
</div>
<!-- Layered Card 2: Academic Alert (Primary Highlight) -->
<div class="bg-primary p-4 rounded-xl shadow-lg flex items-center gap-4 transform translate-x-4 scale-105">
<div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<div class="flex-1">
<div class="h-2 w-20 bg-white rounded-full mb-2"></div>
<div class="h-2 w-36 bg-white/40 rounded-full"></div>
</div>
</div>
<!-- Layered Card 3: Deadline Warning (Tertiary Highlight) -->
<div class="bg-white p-4 rounded-xl shadow-sm border border-outline-variant/20 flex items-center gap-4 transform -translate-x-2 opacity-80">
<div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">event</span>
</div>
<div class="flex-1">
<div class="h-2 w-28 bg-surface-container-highest rounded-full mb-2"></div>
<div class="h-2 w-24 bg-surface-container-low rounded-full"></div>
</div>
</div>
</div>
<!-- Abstract Overlay Elements -->
<div class="absolute top-8 right-8 w-12 h-12 rounded-full bg-primary-container/20 blur-xl"></div>
<div class="absolute bottom-12 left-8 w-16 h-16 rounded-full bg-tertiary/10 blur-2xl"></div>
</div>
</div>
<!-- Content Section -->
<div class="text-center space-y-6">
<h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight leading-tight">
                Stay Updated with <br/>
<span class="bg-gradient-to-r from-primary to-primary-container bg-clip-text text-transparent">Notifications</span>
</h1>
<p class="font-body text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto">
                Get real-time updates on your grades, schedule changes, and important campus announcements as they happen.
            </p>
</div>
<!-- Progress Indicator -->
<div class="flex gap-2 mt-12 mb-8">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2 rounded-full bg-primary shadow-sm shadow-primary/20"></div>
</div>
</main>
<!-- Bottom Action Section (Focus Float Style) -->
<footer class="mt-auto px-6 pb-12 w-full max-w-lg mx-auto">
<div class="p-2 bg-surface-container-low rounded-3xl border border-outline-variant/5">
<button class="w-full py-5 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-lg shadow-xl shadow-primary/30 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                Enable Notifications
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Secondary Action -->
<button class="w-full mt-4 py-3 text-on-surface-variant font-label text-sm font-medium hover:text-on-surface transition-colors">
            Maybe Later
        </button>
</footer>
<!-- No-Line Rule: Section Separation via Tonal Backgrounds -->
<div class="fixed bottom-0 left-0 w-full h-1/3 -z-10 bg-gradient-to-t from-surface-container-low/50 to-transparent"></div>
</body></html>
